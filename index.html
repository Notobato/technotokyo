<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>TOKIO!</title>
    <script>
      const savedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      if (savedTheme || prefersDark) {
        document.documentElement.dataset.theme = savedTheme || "dark";
      }
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>TECHNOPOLIS.TOKYO</h1>
      <button
        class="theme-toggle"
        id="themeToggle"
        type="button"
        aria-label="Toggle dark mode"
      >
        <span class="theme-icon" aria-hidden="true">☾</span>
        <span class="visually-hidden">Dark mode</span>
      </button>
    </header>
    <main>
      <section>
        <p>YMOがお好きですね？</p>
      </section>
      <section>
        <h2>「テクノポリス」について</h2>
        <figure>
          <blockquote>
            <p>
              単に売れる曲を書いてやろうと思って
            </p>
          </blockquote>
          <figcaption>
            <cite
              >―
              <a href="https://www.sitesakamoto.com/"
                >坂本龍一</a
              ></cite
            >
          </figcaption>
        </figure>
      </section>
      <section>
        <h2>「テクノポリス」を聴く</h2>
        <div class="links">
          <iframe
            height="175"
            width="100%"
            title="Media player"
            src="https://embed.music.apple.com/us/album/technopolis/1291843638?i=1291843640&amp;itscg=30200&amp;itsct=music_box_player&amp;ls=1&amp;app=music&amp;mttnsubad=1291843640&amp;theme=auto"
            id="embedPlayer"
            sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
            allow="autoplay *; encrypted-media *; clipboard-write"
            style="
              border: 0px;
              border-radius: 12px;
              width: 100%;
              height: 175px;
              max-width: 660px;
            "
          ></iframe>
          <iframe
            data-testid="embed-iframe"
            style="border-radius: 12px"
            src="https://open.spotify.com/embed/track/5MtYHSbBf38SdGWsaBVdsv?utm_source=generator"
            width="100%"
            height="152"
            frameborder="0"
            allowfullscreen=""
            allow="
              autoplay;
              clipboard-write;
              encrypted-media;
              fullscreen;
              picture-in-picture;
            "
            loading="lazy"
          ></iframe>
        </div>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 technopolis.tokyo</p>
    </footer>
    <script>
      const themeToggle = document.getElementById("themeToggle");
      const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

      function getTheme() {
        return document.documentElement.dataset.theme || "light";
      }

      function setTheme(theme, persist = true) {
        document.documentElement.dataset.theme = theme;
        themeToggle.querySelector(".theme-icon").textContent =
          theme === "dark" ? "☼" : "☾";
        themeToggle.title =
          theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
        themeToggle.setAttribute(
          "aria-label",
          theme === "dark" ? "Switch to light mode" : "Switch to dark mode",
        );

        if (persist) {
          localStorage.setItem("theme", theme);
        }
      }

      setTheme(getTheme(), false);

      themeToggle.addEventListener("click", () => {
        setTheme(getTheme() === "dark" ? "light" : "dark");
      });

      mediaQuery.addEventListener("change", (event) => {
        if (!localStorage.getItem("theme")) {
          setTheme(event.matches ? "dark" : "light", false);
        }
      });
    </script>
  </body>
</html>
